
[env]
TERM = "xterm-256color"

[window]
opacity = 1.0
blur = true

[keyboard]
bindings = [
	{ key = "Back", mods = "Control", chars = "\u0017" },
]

[font]
size = 14.0

[font.bold]
#family = "MesloLGS Nerd Font Mono"
family = "JetBrains Mono Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "JetBrains Mono Nerd Font Mono"
#family = "MesloLGS Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "JetBrains Mono Nerd Font Mono"
#family = "MesloLGS Nerd Font Mono"
style = "Italic"

[font.normal]
#family = "MesloLGS Nerd Font Mono"
family = "JetBrains Mono Nerd Font Mono"
style = "Regular"

[general]
import = [
  "~/.config/alacritty/catppuccin-mocha.toml",
]
